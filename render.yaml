services:
  - type: web
    name: shadmer-shop
    env: python
    runtime: python-3.11
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: shadmer-shop-db
          property: connectionString

databases:
  - name: shadmer-shop-db
    databaseName: shadmer_shop
    user: shadmer_shop_user